<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prácticas Profesionales - Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../master.css">
    <link rel="stylesheet" href="css/registerOperator.css">

</head>
<body>

<header></header> <script src="../Templates/TemplateJS/Header.js"></script>


<div class="container">
    <div class="form-container">
        <h2>Registrar Nuevo Operador</h2>
        <p>Complete los siguientes campos para dar de alta a un operador en el sistema.</p>

        <form id="form-register-operator" novalidate>

            <div class="form-group">
                <label for="name">Nombre(s):</label>
                <input type="text" id="name" required placeholder="Ej. Juan">
            </div>

            <div class="form-group">
                <label for="fLastName">Apellido Paterno:</label>
                <input type="text" id="fLastName" required placeholder="Ej. Pérez">
            </div>

            <div class="form-group">
                <label for="mLastName">Apellido Materno:</label>
                <input type="text" id="mLastName" required placeholder="Ej. Gómez">
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" required placeholder="ejemplo@upiicsa.edu.mx">
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" required placeholder="Mínimo 8 caracteres">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Contraseña:</label>
                <input type="password" id="confirmPassword" required placeholder="Repita la contraseña">
            </div>

            <div class="form-actions">
                <button type="submit" id="btn-submit-operator">Registrar Operador</button>
            </div>

        </form>
    </div>
</div>

<script src="../Templates/TemplateJS/DarkMode.js"></script>

<footer></footer> <script src="../Templates/TemplateJS/Footer.js"></script>

<script src="js/registerOperator.js"></script>
<script src="../Templates/TemplateJS/AlertModal.js"></script>



</body>
</html>
